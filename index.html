<!DOCTYPE html>
<html>
<head>
<title>Attack on Bigsong</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
color:white;
}

/* INTRO */

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:100;
}

#title{
font-size:80px;
color:orange;
text-shadow:
0 0 20px red,
0 0 40px orange,
0 0 60px yellow;
animation:fire 1s infinite alternate;
}

@keyframes fire{
from{transform:scale(1)}
to{transform:scale(1.05)}
}

/* percikan api */

.spark{
position:absolute;
width:6px;
height:6px;
background:orange;
border-radius:50%;
}

/* PLAYER */

#player{
position:absolute;
width:70px;
height:70px;
background:linear-gradient(#888,#eee);
clip-path:polygon(
50% 0%,
70% 25%,
100% 40%,
75% 60%,
65% 100%,
50% 80%,
35% 100%,
25% 60%,
0% 40%,
30% 25%
);
bottom:80px;
left:50%;
box-shadow:0 0 15px cyan;
}

/* enemy kambing */

.enemy{
position:absolute;
width:120px;
height:80px;
font-size:22px;
text-align:center;
background:#553311;
border-radius:20px;
}

/* boss */

.boss{
position:absolute;
width:220px;
height:140px;
background:red;
font-size:30px;
text-align:center;
line-height:140px;
border:4px solid white;
}

/* bullet */

.bullet{
position:absolute;
width:6px;
height:14px;
background:yellow;
}

.enemyBullet{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:orange;
}

/* score */

#score{
position:absolute;
top:10px;
left:10px;
}

</style>

</head>

<body>

<div id="intro">
<div id="title">ATTACK ON BIGSONG</div>
</div>

<div id="player"></div>
<div id="score">Score: 0</div>

<script>

/* INTRO SPARK */

let intro=document.getElementById("intro")

function spark(){

let s=document.createElement("div")
s.className="spark"

s.style.left=Math.random()*window.innerWidth+"px"
s.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(s)

setTimeout(()=>s.remove(),1000)

}

setInterval(spark,80)

/* START GAME AFTER 4s */

setTimeout(()=>{
intro.style.display="none"
},4000)

/* PLAYER */

let player=document.getElementById("player")

document.addEventListener("mousemove",e=>{
player.style.left=e.clientX-35+"px"
})

document.addEventListener("touchmove",e=>{
player.style.left=e.touches[0].clientX-35+"px"
})

/* DATA */

let score=0
let enemyTypes=["Bayu","Amer","Sapei"]

/* AUTO SHOOT PLAYER */

setInterval(shoot,333)

function shoot(){

let bullet=document.createElement("div")
bullet.className="bullet"

bullet.style.left=player.offsetLeft+32+"px"
bullet.style.top=player.offsetTop+"px"

document.body.appendChild(bullet)

let move=setInterval(()=>{

bullet.style.top=bullet.offsetTop-10+"px"

if(bullet.offsetTop<0){
bullet.remove()
clearInterval(move)
}

document.querySelectorAll(".enemy").forEach(enemy=>{

if(
bullet.offsetTop<enemy.offsetTop+80 &&
bullet.offsetTop+14>enemy.offsetTop &&
bullet.offsetLeft<enemy.offsetLeft+120 &&
bullet.offsetLeft+6>enemy.offsetLeft
){

enemy.remove()
bullet.remove()
clearInterval(move)

score++
document.getElementById("score").innerText="Score: "+score

}

})

},20)

}

/* SPAWN MUSUH */

setInterval(spawnEnemy,5000)

function spawnEnemy(){

let type=enemyTypes[Math.floor(Math.random()*enemyTypes.length)]

let enemy=document.createElement("div")
enemy.className="enemy"

enemy.innerHTML="🐐<br>"+type

enemy.style.left=Math.random()*window.innerWidth+"px"
enemy.style.top="-80px"

document.body.appendChild(enemy)

/* AUTO SHOOT ENEMY */

let attack=setInterval(()=>{
enemyAttack(enemy,type)
},333)

let move=setInterval(()=>{

enemy.style.top=enemy.offsetTop+2+"px"

if(enemy.offsetTop>window.innerHeight){
enemy.remove()
clearInterval(move)
clearInterval(attack)
}

},20)

}

/* SERANGAN MUSUH */

function enemyAttack(enemy,type){

if(!document.body.contains(enemy)) return

if(type=="Bayu"){
laser(enemy)
}

if(type=="Amer"){
spread(enemy)
}

if(type=="Sapei"){
bubble(enemy)
}

}

/* LASER */

function laser(enemy){

let bullet=document.createElement("div")
bullet.className="enemyBullet"

bullet.style.background="red"

bullet.style.left=enemy.offsetLeft+60+"px"
bullet.style.top=enemy.offsetTop+80+"px"

document.body.appendChild(bullet)

moveDown(bullet,7)

}

/* PELURU SEGALA ARAH */

function spread(enemy){

for(let i=0;i<6;i++){

let bullet=document.createElement("div")
bullet.className="enemyBullet"

bullet.style.left=enemy.offsetLeft+60+"px"
bullet.style.top=enemy.offsetTop+60+"px"

document.body.appendChild(bullet)

let angle=i*(Math.PI/3)

let vx=Math.cos(angle)*4
let vy=Math.sin(angle)*4

moveAngle(bullet,vx,vy)

}

}

/* BUBBLE */

function bubble(enemy){

let bullet=document.createElement("div")
bullet.className="enemyBullet"

bullet.style.background="white"

bullet.style.left=enemy.offsetLeft+60+"px"
bullet.style.top=enemy.offsetTop+80+"px"

document.body.appendChild(bullet)

moveDown(bullet,4)

}

/* GERAK PELURU */

function moveDown(bullet,speed){

let move=setInterval(()=>{

bullet.style.top=bullet.offsetTop+speed+"px"

if(bullet.offsetTop>window.innerHeight){
bullet.remove()
clearInterval(move)
}

},20)

}

function moveAngle(bullet,vx,vy){

let move=setInterval(()=>{

bullet.style.left=bullet.offsetLeft+vx+"px"
bullet.style.top=bullet.offsetTop+vy+"px"

if(
bullet.offsetTop>window.innerHeight||
bullet.offsetLeft<0||
bullet.offsetLeft>window.innerWidth
){
bullet.remove()
clearInterval(move)
}

},20)

}

/* BOSS */

setTimeout(spawnBoss,60000)

function spawnBoss(){

let boss=document.createElement("div")
boss.className="boss"

boss.innerText="JOKOWI"

boss.style.left="30%"
boss.style.top="80px"

document.body.appendChild(boss)

setInterval(()=>electric(boss),333)

}

/* GELOMBANG LISTRIK */

function electric(boss){

for(let i=0;i<8;i++){

let bullet=document.createElement("div")
bullet.className="enemyBullet"

bullet.style.background="cyan"

bullet.style.left=boss.offsetLeft+110+"px"
bullet.style.top=boss.offsetTop+70+"px"

document.body.appendChild(bullet)

let angle=i*(Math.PI/4)

let vx=Math.cos(angle)*5
let vy=Math.sin(angle)*5

moveAngle(bullet,vx,vy)

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Attack on Bigsong</title>

<style>

body{
margin:0;
overflow:hidden;
touch-action:none;
background:black;
color:white;
font-family:monospace;
}

/* INTRO */

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
}

#title{
font-size:70px;
color:orange;
text-shadow:0 0 20px red,0 0 40px orange,0 0 60px yellow;
animation:fire 1s infinite alternate;
}

@keyframes fire{
from{transform:scale(1)}
to{transform:scale(1.05)}
}

/* PLAYER */

#player{
position:absolute;
width:70px;
height:70px;
background:linear-gradient(#999,#eee);
clip-path:polygon(50% 0%,80% 40%,100% 100%,50% 80%,0% 100%,20% 40%);
bottom:80px;
left:50%;
}

/* ENEMY */

.enemy{
position:absolute;
width:120px;
height:80px;
background:#553311;
border-radius:20px;
font-size:22px;
text-align:center;
}

/* BOSS */

.boss{
position:absolute;
width:220px;
height:150px;
background:red;
font-size:26px;
text-align:center;
line-height:40px;
border:4px solid white;
}

/* BULLETS */

.bullet{
position:absolute;
width:6px;
height:14px;
background:yellow;
}

.enemyBullet{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
background:orange;
}

/* STAR */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
}

/* BOSS HP BAR */

#bossBar{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:300px;
height:20px;
background:#222;
border:2px solid white;
}

#bossHP{
height:100%;
width:100%;
background:red;
}

/* EXPLOSION */

.explosion{
position:absolute;
width:80px;
height:80px;
background:orange;
border-radius:50%;
box-shadow:0 0 40px red;
}

#score{
position:absolute;
top:10px;
left:10px;
}

</style>

</head>

<body>

<div id="intro">
<div id="title">ATTACK ON BIGSONG</div>
</div>

<div id="player"></div>
<div id="score">Score: 0</div>

<div id="bossBar">
<div id="bossHP"></div>
</div>

<script>

/* INTRO */

setTimeout(()=>{
document.getElementById("intro").style.display="none"
},4000)

/* PLAYER */

let player=document.getElementById("player")

document.addEventListener("mousemove",e=>{
player.style.left=e.clientX-35+"px"
})

document.addEventListener("touchmove",e=>{
player.style.left=e.touches[0].clientX-35+"px"
})

/* DATA */

let score=0
let enemyTypes=["Bayu","Amer","Sapei"]
let bossHP=50

/* STAR BACKGROUND */

function createStar(){

let star=document.createElement("div")
star.className="star"

star.style.left=Math.random()*window.innerWidth+"px"
star.style.top="0px"

document.body.appendChild(star)

let speed=Math.random()*2+1

let move=setInterval(()=>{

star.style.top=star.offsetTop+speed+"px"

if(star.offsetTop>window.innerHeight){
star.remove()
clearInterval(move)
}

},20)

}

setInterval(createStar,100)

/* PLAYER SHOOT */

setInterval(playerShoot,2000)

function playerShoot(){

for(let i=-1;i<=1;i++){

let bullet=document.createElement("div")
bullet.className="bullet"

bullet.style.left=player.offsetLeft+32+"px"
bullet.style.top=player.offsetTop+"px"

document.body.appendChild(bullet)

let vx=i*2

let move=setInterval(()=>{

bullet.style.top=bullet.offsetTop-8+"px"
bullet.style.left=bullet.offsetLeft+vx+"px"

if(bullet.offsetTop<0){
bullet.remove()
clearInterval(move)
}

checkBossHit(bullet)

},20)

}

}

/* SPAWN ENEMY */

setInterval(spawnEnemy,5000)

function spawnEnemy(){

let type=enemyTypes[Math.floor(Math.random()*enemyTypes.length)]

let enemy=document.createElement("div")
enemy.className="enemy"

enemy.innerHTML="🐐<br>"+type

enemy.style.left=Math.random()*window.innerWidth+"px"
enemy.style.top="-80px"

document.body.appendChild(enemy)

let shoot=setInterval(()=>{
enemyAttack(enemy,type)
},2000)

let move=setInterval(()=>{

enemy.style.top=enemy.offsetTop+2+"px"

if(enemy.offsetTop>window.innerHeight){
enemy.remove()
clearInterval(move)
clearInterval(shoot)
}

},20)

}

/* ENEMY ATTACK */

function enemyAttack(enemy,type){

if(type=="Bayu") laser(enemy)
if(type=="Amer") bigShot(enemy)
if(type=="Sapei") bubble(enemy)

}

function laser(enemy){

let bullet=document.createElement("div")
bullet.className="enemyBullet"
bullet.style.background="red"

bullet.style.left=enemy.offsetLeft+60+"px"
bullet.style.top=enemy.offsetTop+80+"px"

document.body.appendChild(bullet)

moveDown(bullet,6)

}

function bigShot(enemy){

let bullet=document.createElement("div")
bullet.className="enemyBullet"

bullet.style.width="20px"
bullet.style.height="20px"
bullet.style.background="orange"

bullet.style.left=enemy.offsetLeft+50+"px"
bullet.style.top=enemy.offsetTop+80+"px"

document.body.appendChild(bullet)

moveDown(bullet,5)

}

function bubble(enemy){

let bullet=document.createElement("div")
bullet.className="enemyBullet"
bullet.style.background="white"

bullet.style.left=enemy.offsetLeft+60+"px"
bullet.style.top=enemy.offsetTop+80+"px"

document.body.appendChild(bullet)

moveDown(bullet,4)

}

function moveDown(bullet,speed){

let move=setInterval(()=>{

bullet.style.top=bullet.offsetTop+speed+"px"

if(bullet.offsetTop>window.innerHeight){
bullet.remove()
clearInterval(move)
}

},20)

}

/* BOSS */

setTimeout(spawnBoss,60000)

function spawnBoss(){

let boss=document.createElement("div")
boss.className="boss"

boss.innerHTML="🐒<br>JOKOWI"

boss.style.left="30%"
boss.style.top="80px"

document.body.appendChild(boss)

setInterval(()=>{
bossMissile(boss)
},3000)

}

/* BOSS MISSILE */

function bossMissile(boss){

let missile=document.createElement("div")
missile.className="enemyBullet"

missile.style.width="20px"
missile.style.height="40px"
missile.style.background="red"

missile.style.left=boss.offsetLeft+100+"px"
missile.style.top=boss.offsetTop+120+"px"

document.body.appendChild(missile)

let move=setInterval(()=>{

let dx=player.offsetLeft-missile.offsetLeft
let dy=player.offsetTop-missile.offsetTop

let dist=Math.sqrt(dx*dx+dy*dy)

missile.style.left=missile.offsetLeft+(dx/dist*4)+"px"
missile.style.top=missile.offsetTop+(dy/dist*4)+"px"

if(missile.offsetTop>window.innerHeight){
missile.remove()
clearInterval(move)
}

},20)

}

/* BOSS HIT */

function checkBossHit(bullet){

let boss=document.querySelector(".boss")

if(!boss) return

if(
bullet.offsetTop<boss.offsetTop+150 &&
bullet.offsetTop+14>boss.offsetTop &&
bullet.offsetLeft<boss.offsetLeft+220 &&
bullet.offsetLeft+6>boss.offsetLeft
){

bossHP--

updateBossHP()

bullet.remove()

if(bossHP<=0){

explode(boss.offsetLeft,boss.offsetTop)

boss.remove()

score+=100
document.getElementById("score").innerText="Score: "+score

}

}

}

/* UPDATE HP */

function updateBossHP(){

let percent=(bossHP/50)*100

document.getElementById("bossHP").style.width=percent+"%"

}

/* EXPLOSION */

function explode(x,y){

let boom=document.createElement("div")
boom.className="explosion"

boom.style.left=x+"px"
boom.style.top=y+"px"

document.body.appendChild(boom)

setTimeout(()=>{
boom.remove()
},500)

}

</script>

</body>
</html>

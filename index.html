<!DOCTYPE html>
<html>
<head>
<title>Attack on Bigsong</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
color:white;
}

/* PLAYER JET */

#player{
position:absolute;
width:60px;
height:60px;
background:linear-gradient(gray,white);
clip-path:polygon(50% 0%,80% 40%,100% 100%,50% 80%,0% 100%,20% 40%);
bottom:80px;
left:50%;
}

/* ENEMY */

.enemy{
position:absolute;
width:60px;
height:40px;
background:purple;
border-radius:10px;
text-align:center;
line-height:40px;
font-size:12px;
}

/* BOSS */

.boss{
position:absolute;
width:200px;
height:120px;
background:red;
border:4px solid white;
text-align:center;
line-height:120px;
font-size:24px;
}

/* BULLETS */

.bullet{
position:absolute;
width:6px;
height:14px;
background:yellow;
}

.enemyBullet{
position:absolute;
width:10px;
height:10px;
background:orange;
border-radius:50%;
}

/* UI */

#score{
position:absolute;
top:10px;
left:10px;
}

</style>

</head>

<body>

<div id="player"></div>
<div id="score">Score: 0</div>

<script>

/* PLAYER CONTROL */

let player=document.getElementById("player")

document.addEventListener("mousemove",e=>{
player.style.left=e.clientX-30+"px"
})

document.addEventListener("touchmove",e=>{
player.style.left=e.touches[0].clientX-30+"px"
})

/* DATA GAME */

let score=0
let enemyTypes=["Bayu","Amer","Sapei"]

/* SHOOT */

document.addEventListener("click",shoot)
document.addEventListener("touchstart",shoot)

function shoot(){

let bullet=document.createElement("div")
bullet.className="bullet"

bullet.style.left=player.offsetLeft+27+"px"
bullet.style.top=player.offsetTop+"px"

document.body.appendChild(bullet)

let move=setInterval(()=>{

bullet.style.top=bullet.offsetTop-10+"px"

if(bullet.offsetTop<0){
bullet.remove()
clearInterval(move)
}

document.querySelectorAll(".enemy").forEach(enemy=>{

if(
bullet.offsetTop<enemy.offsetTop+40 &&
bullet.offsetTop+14>enemy.offsetTop &&
bullet.offsetLeft<enemy.offsetLeft+60 &&
bullet.offsetLeft+6>enemy.offsetLeft
){

enemy.remove()
bullet.remove()
clearInterval(move)

score++
document.getElementById("score").innerText="Score: "+score

}

})

},20)

}

/* SPAWN MUSUH */

setInterval(spawnEnemy,5000)

function spawnEnemy(){

let type=enemyTypes[Math.floor(Math.random()*enemyTypes.length)]

let enemy=document.createElement("div")
enemy.className="enemy"
enemy.innerText=type

enemy.style.left=Math.random()*window.innerWidth+"px"
enemy.style.top="-40px"

document.body.appendChild(enemy)

let move=setInterval(()=>{

enemy.style.top=enemy.offsetTop+2+"px"

if(Math.random()<0.03){
enemyAttack(enemy,type)
}

if(enemy.offsetTop>window.innerHeight){
enemy.remove()
clearInterval(move)
}

},20)

}

/* SERANGAN MUSUH */

function enemyAttack(enemy,type){

if(type=="Bayu"){
laser(enemy)
}

if(type=="Amer"){
spread(enemy)
}

if(type=="Sapei"){
bubble(enemy)
}

}

/* LASER */

function laser(enemy){

let bullet=document.createElement("div")
bullet.className="enemyBullet"

bullet.style.background="red"

bullet.style.left=enemy.offsetLeft+25+"px"
bullet.style.top=enemy.offsetTop+40+"px"

document.body.appendChild(bullet)

moveDown(bullet,6)

}

/* PELURU SEGALA ARAH */

function spread(enemy){

for(let i=0;i<6;i++){

let bullet=document.createElement("div")
bullet.className="enemyBullet"

bullet.style.left=enemy.offsetLeft+30+"px"
bullet.style.top=enemy.offsetTop+20+"px"

document.body.appendChild(bullet)

let angle=i*(Math.PI/3)

let vx=Math.cos(angle)*4
let vy=Math.sin(angle)*4

moveAngle(bullet,vx,vy)

}

}

/* SEMBURAN BUBBLE */

function bubble(enemy){

let bullet=document.createElement("div")
bullet.className="enemyBullet"

bullet.style.background="white"

bullet.style.left=enemy.offsetLeft+25+"px"
bullet.style.top=enemy.offsetTop+40+"px"

document.body.appendChild(bullet)

moveDown(bullet,4)

}

/* GERAK PELURU */

function moveDown(bullet,speed){

let move=setInterval(()=>{

bullet.style.top=bullet.offsetTop+speed+"px"

if(bullet.offsetTop>window.innerHeight){
bullet.remove()
clearInterval(move)
}

},20)

}

/* GERAK ANGLE */

function moveAngle(bullet,vx,vy){

let move=setInterval(()=>{

bullet.style.left=bullet.offsetLeft+vx+"px"
bullet.style.top=bullet.offsetTop+vy+"px"

if(
bullet.offsetTop>window.innerHeight||
bullet.offsetLeft<0||
bullet.offsetLeft>window.innerWidth
){
bullet.remove()
clearInterval(move)
}

},20)

}

/* BOSS SETELAH 1 MENIT */

setTimeout(spawnBoss,60000)

function spawnBoss(){

let boss=document.createElement("div")
boss.className="boss"

boss.innerText="JOKOWI"

boss.style.left="30%"
boss.style.top="80px"

document.body.appendChild(boss)

setInterval(()=>electric(boss),800)

}

/* GELOMBANG LISTRIK */

function electric(boss){

for(let i=0;i<8;i++){

let bullet=document.createElement("div")
bullet.className="enemyBullet"

bullet.style.background="cyan"

bullet.style.left=boss.offsetLeft+100+"px"
bullet.style.top=boss.offsetTop+60+"px"

document.body.appendChild(bullet)

let angle=i*(Math.PI/4)

let vx=Math.cos(angle)*5
let vy=Math.sin(angle)*5

moveAngle(bullet,vx,vy)

}

}

</script>

</body>
</html>
